name: Build and Push Docker Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
  release:
    types: [published]

env:
  IMAGE_NAME: ghcr.io/xmplusdev/xmplus-docs

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write

    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64]

    outputs:
      digest-amd64: ${{ steps.export-amd64.outputs.digest || '' }}
      digest-arm64: ${{ steps.export-arm64.outputs.digest || '' }}

    steps:
      - name: Clean up old GHA caches (pre-build)
        uses: actions/github-script@v7
        with:
          script: |
            const { data: { actions_caches } } = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            if (!actions_caches?.length) {
              console.log('No caches found — nothing to clean up.');
              return;
            }

            // Keep only the 2 most recent caches per scope; delete the rest
            const byScope = {};
            for (const cache of actions_caches) {
              const scope = cache.key ?? 'unknown';
              (byScope[scope] ??= []).push(cache);
            }

            let deleted = 0;
            for (const [scope, caches] of Object.entries(byScope)) {
              caches.sort((a, b) => new Date(b.last_accessed_at) - new Date(a.last_accessed_at));
              const toDelete = caches.slice(2); // keep 2 most recent
              for (const cache of toDelete) {
                console.log(`Deleting cache id=${cache.id} scope="${scope}" last_accessed=${cache.last_accessed_at}`);
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: cache.id,
                });
                deleted++;
              }
            }
            console.log(`Done. Deleted ${deleted} old cache(s).`);

      - name: Checkout source (with LFS)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          lfs: true
          ref: ${{ github.ref }}

      - name: Prepare platform slug
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_SLUG=${platform//\//-}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push (by digest)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_SLUG }}
          cache-to: type=gha,scope=${{ env.PLATFORM_SLUG }},mode=max
          provenance: false
          sbom: false

      - name: Export digest
        id: export-amd64
        if: matrix.platform == 'linux/amd64'
        run: echo "digest=${{ steps.build.outputs.digest }}" >> $GITHUB_OUTPUT

      - name: Export digest
        id: export-arm64
        if: matrix.platform == 'linux/arm64'
        run: echo "digest=${{ steps.build.outputs.digest }}" >> $GITHUB_OUTPUT

  merge:
    name: Create & Push Multi-Arch Manifest
    runs-on: ubuntu-latest
    needs: build
    if: always() && !cancelled()
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (for tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}

      - name: Debug metadata & digests
        env:
          DIGEST_AMD64: ${{ needs.build.outputs.digest-amd64 }}
          DIGEST_ARM64: ${{ needs.build.outputs.digest-arm64 }}
        run: |
          echo "Version from metadata : ${{ steps.meta.outputs.version }}"
          echo "All tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo ""
          echo "Digests:"
          echo "  amd64 → $DIGEST_AMD64"
          echo "  arm64 → $DIGEST_ARM64"

      - name: Create and push multi-arch manifest list
        env:
          DIGEST_AMD64: ${{ needs.build.outputs.digest-amd64 }}
          DIGEST_ARM64: ${{ needs.build.outputs.digest-arm64 }}
        run: |
          set -euo pipefail

          # Collect digests
          DIGEST_ARGS=()
          [[ -n "$DIGEST_AMD64" ]] && DIGEST_ARGS+=("${{ env.IMAGE_NAME }}@$DIGEST_AMD64")
          [[ -n "$DIGEST_ARM64" ]] && DIGEST_ARGS+=("${{ env.IMAGE_NAME }}@$DIGEST_ARM64")

          if [[ ${#DIGEST_ARGS[@]} -eq 0 ]]; then
            echo "Error: No platform digests available. Nothing to merge."
            exit 1
          fi

          # Build --tag arguments from metadata
          TAG_ARGS=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] && TAG_ARGS+=("--tag" "$tag")
          done < <(echo "${{ steps.meta.outputs.tags }}" | tr ' ' '\n')

          if [[ ${#TAG_ARGS[@]} -eq 0 ]]; then
            echo "Warning: No tags generated — pushing manifest without tags"
          fi

          echo "Creating manifest list with ${#DIGEST_ARGS[@]} platforms"
          echo "Tags being applied:"
          printf '  %s\n' "${TAG_ARGS[@]/--tag /}"

          docker buildx imagetools create \
            "${TAG_ARGS[@]}" \
            "${DIGEST_ARGS[@]}"

      - name: Inspect published manifest (latest + version)
        run: |
          set +e
          echo "Inspecting latest (if exists):"
          docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:latest || true
          echo ""
          echo "Inspecting version tag:"
          docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }} || true